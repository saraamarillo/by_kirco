<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Destinatarios — by_kirco</title>
<meta name="description" content="Mensajes de las personas que encontraron una cartita de by_kirco." />
<link rel="icon" type="image/png" href="/assets/favicon.png" />
<link rel="apple-touch-icon" href="/assets/favicon.png" />
<style>
@font-face { font-family: "Visby Round CF"; src: url("fonts/VisbyRoundCF-Heavy.ttf") format("truetype"); font-weight: 800; font-style: normal; font-display: swap; }
@font-face { font-family: "OCR B Std"; src: url("fonts/OCRBStd.otf") format("opentype"); font-weight: 400; font-style: normal; font-display: swap; }

:root {
  --kirco-green:        #a0d76b;
  --kirco-green-deep:   #6f9c3e;
  --kirco-green-tint:   #ecf7df;
  --kirco-orange:       #ffaa4d;
  --kirco-orange-deep:  #d07f1f;
  --kirco-orange-tint:  #fff2e2;
  --kirco-yellow-tint:  #fffdda;
  --kirco-white:        #ffffff;
  --kirco-paper:        #f7f1e3;
  --kirco-ink:          #2e2b25;
  --kirco-ink-soft:     #6b6557;
  --text-muted:         #6b6557;
  --font-display: "Visby Round CF", system-ui, sans-serif;
  --font-mono:    "OCR B Std", monospace;
  --track-mono:   0.16em;
  --radius-pill:  999px;
  --shadow-card:  0 2px 6px rgba(46,43,37,.06), 0 10px 28px rgba(46,43,37,.08);
  --shadow-pop:   0 4px 12px rgba(46,43,37,.10), 0 18px 44px rgba(46,43,37,.14);
}
*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background: var(--kirco-paper);
  color: var(--kirco-ink);
  font-family: system-ui, -apple-system, sans-serif;
  overflow-x: hidden;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* ── HEADER ── */
.site-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  max-width: 1100px;
  margin: 0 auto;
  padding: 26px 48px 0;
  width: 100%;
}
.site-header .logo { height: 96px; display: block; }
.back-link {
  font-family: var(--font-mono);
  font-size: 13px;
  letter-spacing: var(--track-mono);
  color: var(--text-muted);
  text-decoration: none;
  transition: color 150ms;
}
.back-link:hover { color: var(--kirco-green-deep); }

/* ── HERO ── */
.hero-dest {
  position: relative;
  overflow: hidden;
  text-align: center;
  padding: 90px 48px 110px;
}
.hero-wm {
  position: absolute;
  background: url("assets/monograma-naranja.png") no-repeat center / contain;
  width: 520px;
  height: 520px;
  top: -140px;
  left: -160px;
  transform: rotate(-12deg);
  opacity: 0.07;
  pointer-events: none;
}
.hero-inner {
  position: relative;
  max-width: 720px;
  margin: 0 auto;
}
.kicker-tag {
  font-family: var(--font-mono);
  font-size: 13px;
  letter-spacing: var(--track-mono);
  text-transform: uppercase;
  color: var(--kirco-orange-deep);
  margin: 0 0 20px;
}
.hero-dest h1 {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: clamp(46px, 7vw, 72px);
  line-height: 1.05;
  margin: 0;
  color: var(--kirco-green-deep);
}
.hero-sub {
  font-size: 20px;
  line-height: 1.6;
  color: var(--text-muted);
  max-width: 520px;
  margin: 26px auto 0;
}

/* ── TESTIMONIOS ── */
.testimonios {
  position: relative;
  padding: 20px 48px 130px;
}
.testimonios-grid {
  max-width: 1100px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 36px;
}

/* ── CARD ── */
.dest-card {
  position: relative;
  opacity: 0;
  transform: translateY(28px);
  transition: opacity 560ms ease-out, transform 560ms ease-out;
}
.dest-card.visible { opacity: 1; transform: none; }

.dest-bubble {
  border-radius: 24px;
  padding: 32px 28px;
  position: relative;
  z-index: 2;
  box-shadow: var(--shadow-card);
  transition: transform 200ms ease-out, box-shadow 200ms ease-out;
}
.dest-bubble:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-pop);
}
.dest-bubble.verde { background: var(--kirco-green-deep); }
.dest-bubble.naranja { background: var(--kirco-orange-deep); }

.dest-quote {
  font-size: 17px;
  line-height: 1.6;
  color: #ffffff;
  margin: 0 0 22px;
}
.dest-quote::before { content: '\201c'; }
.dest-quote::after  { content: '\201d'; }

.dest-footer {
  display: flex;
  align-items: center;
  gap: 12px;
}
.dest-avatar {
  width: 46px;
  height: 46px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.6);
  background: rgba(255,255,255,0.18);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  overflow: hidden;
}
.dest-avatar img {
  width: 28px;
  height: 28px;
  filter: brightness(0) invert(1);
  opacity: 0.8;
}
.dest-nombre {
  display: block;
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 15px;
  color: #fff;
}
.dest-fecha {
  display: block;
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: var(--track-mono);
  text-transform: uppercase;
  color: rgba(255,255,255,0.75);
  margin-top: 2px;
}

.dest-tail {
  position: absolute;
  left: 36px;
  bottom: -9px;
  width: 20px;
  height: 20px;
  transform: rotate(45deg);
  border-radius: 4px;
  z-index: 1;
}
.dest-tail.verde { background: var(--kirco-green-deep); }
.dest-tail.naranja { background: var(--kirco-orange-deep); }

/* ── CTA ── */
.cta-dest {
  position: relative;
  background: var(--kirco-green-tint);
  padding: 100px 48px;
  text-align: center;
  overflow: hidden;
  flex: 1;
}
.cta-wm {
  position: absolute;
  background: url("assets/monograma-naranja.png") no-repeat center / contain;
  width: 340px;
  height: 340px;
  bottom: -90px;
  right: -90px;
  transform: rotate(12deg);
  opacity: 0.1;
  pointer-events: none;
}
.cta-dest-inner {
  position: relative;
  max-width: 600px;
  margin: 0 auto;
}
.cta-dest h2 {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 38px;
  margin: 0;
  color: var(--kirco-green-deep);
}
.btn-cta {
  display: inline-block;
  margin-top: 32px;
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 18px;
  color: #fff;
  background: var(--kirco-orange-deep);
  border: 2px solid var(--kirco-orange-deep);
  border-radius: var(--radius-pill);
  padding: 16px 40px;
  text-decoration: none;
  transition: transform 180ms ease-out;
}
.btn-cta:hover { transform: translateY(-2px); }

/* ── FOOTER ── */
footer {
  background: var(--kirco-orange-deep);
  padding: 60px 48px;
  color: var(--kirco-paper);
  text-align: center;
}
footer p {
  font-family: var(--font-mono);
  font-size: 12px;
  letter-spacing: var(--track-mono);
  text-transform: uppercase;
  margin: 0;
  opacity: 0.9;
}

/* ── RESPONSIVE ── */
@media (max-width: 900px) {
  .testimonios-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 640px) {
  .site-header { padding: 20px 24px 0; }
  .site-header .logo { height: 72px; }
  .hero-dest { padding: 60px 24px 80px; }
  .hero-sub { font-size: 17px; }
  .testimonios { padding: 20px 24px 90px; }
  .testimonios-grid { grid-template-columns: 1fr; }
  .cta-dest { padding: 70px 24px; }
  .cta-dest h2 { font-size: 28px; }
  footer { padding: 40px 24px; }
}
</style>
</head>
<body>

<header class="site-header">
  <a href="/"><img class="logo" src="assets/logo-verde.png" alt="by_kirco" /></a>
  <a href="/" class="back-link">← VOLVER AL INICIO</a>
</header>

<section class="hero-dest">
  <div class="hero-wm" aria-hidden="true"></div>
  <div class="hero-inner">
    <p class="kicker-tag">de mis cartitas</p>
    <h1>Destinatarios</h1>
    <p class="hero-sub">Personas que se encontraron una cartita en el peor o el mejor momento, y quisieron contármelo.</p>
  </div>
</section>

<section class="testimonios">
  <div class="testimonios-grid" id="testimoniosGrid"></div>
</section>

<section class="cta-dest">
  <div class="cta-wm" aria-hidden="true"></div>
  <div class="cta-dest-inner">
    <h2>¿Quieres ser el próximo destinatario?</h2>
    <a href="/quiz.html" class="btn-cta">Para ti</a>
  </div>
</section>

<footer>
  <p>© 2026 by_kirco · Cartas con cariño</p>
</footer>

<script>
var mensajes = [
  { fecha: "26/08/2025", nombre: "Desconocido/a",   mensaje: "J ai trouvé dans une plage une petite bouteille en verre dedans un petit papier avec un beau message signé par By-kirco. J ai décidé de rentrer en contact avec cette personne pour la remercier. Est ce que c est vous By-kirco ? Thank u" },
  { fecha: "18/04/2025", nombre: "Nerea",            mensaje: "Holaa! El sábado paseando por El Retiro me encontré una de vuestras cartitas en un banco y me atreví a abrirla. ¡Me hizo muchísima ilusión! Gracias desde Badajoz ❤️" },
  { fecha: "21/02/2025", nombre: "Llaima",           mensaje: "Hola encontré tu mejor historia en metro prosperidad. Mil gracias!!! Y sabes justo iba a una clase de teatro y compartí esto al principio de la clase con todos porque me pareció muy bonito y todos encantados con la idea, tipo cadena de favores." },
  { fecha: null,         nombre: "Yarin",            mensaje: "Hola buenos días 😃 he encontrado la cartita muy linda ❤️ Me has sacado una sonrisa 🤭" },
  { fecha: "29/01/2025", nombre: "Pablo",            mensaje: "Muchas gracias 🥹 La he dejado para el siguiente en el Hospital de La Paz 😉 Me ha hecho mucha ilusión. ¡Ten muy buen día tú también, anónim@!" },
  { fecha: "12/01/2025", nombre: "Sara",             mensaje: "Hola! Lo he encontrado yo, muchas gracias! Necesitaba leer algo así." },
  { fecha: "22/12/2024", nombre: "Desconocido/a",   mensaje: "Buenasss llegó una carta a mis manos, me encantó el mensaje la verdad. Estaba bastante agobiado, pero muy guay muchas gracias." },
  { fecha: "20/12/2024", nombre: "Franci",           mensaje: "Hola! Gracias por la tarjeta… me la acabo de encontrar y justo pensaba en eso al entrar al metro." },
  { fecha: null,         nombre: "Lili",             mensaje: "Hola acabo de encontrar una de tus cartas, y la verdad es que estoy en una etapa de mi vida en la que el mensaje me hace fuerte, y sobre todo me quita las ganas de dejar de luchar. Gracias a ti por dar la gotita de esperanza que a veces cambia el mundo de alguien." },
  { fecha: "03/10/2024", nombre: "Alejandra",        mensaje: "Me ha llegado la cartita y me ha encantado. Me alegraste el día 🥰. ¡Gracias!" },
  { fecha: "12/01/2024", nombre: "Noa",              mensaje: "Holiii, encontré tu tarjetita de la rosa, me hizo mucha ilu 🥰" },
  { fecha: "07/06/2023", nombre: "Álvaro",           mensaje: "Me encontré uno de tus mensajes 😚 Me animó mucho 🙂 Después de una situación complicada en el trabajo la semana pasada. Parece que fue el destinooo." },
  { fecha: "10/01/2023", nombre: "Elena",            mensaje: "Me quedé con el mensaje y dejé la nota otra vez para que así tú y tu bonito acto lleguen a más personas." },
  { fecha: "14/09/2021", nombre: "Andrea",           mensaje: "¡Hola! Paseando por la Zenia Boulevard he encontrado una cartita. Me alegré un montón. Quería agradecerte por tomarte un momento y escribir a gente desconocida cosas tan bonitas. Ha sido todo un placer." },
  { fecha: "30/08/2021", nombre: "Ángel",            mensaje: "Hola, ¿por casualidad es tuya esta carta? Me gustó mucho." },
  { fecha: "07/08/2021", nombre: "Salvador",         mensaje: "Buenas noches, he encontrado una de tus cartas a desconocidos por Estepona, Málaga. Simplemente quería darte las gracias por la carta y los consejos que escribiste 🤠" },
  { fecha: "21/08/2021", nombre: "Kimera",           mensaje: "Holaaa me he encontrado tu cartita en Quevedo!! Iba a trabajar súper amargada y me has cambiado un poco la mañana, gracias!" },
  { fecha: "07/05/2021", nombre: "Viryi",            mensaje: "Ayer en un banco del metro de Canillas encontré tu mensaje. Me dieron una mala noticia en mi trabajo, iba sumida en mis pensamientos y me pasé de parada. Así encontré tu mensaje. Me dio un subidón tremendo: justo lo que necesitaba leer." },
  { fecha: "22/04/2021", nombre: "Tammy",            mensaje: "Me has hecho el día. Es una carta súper bonita." },
  { fecha: "21/04/2021", nombre: "Laura",            mensaje: "Hola, te escribo porque he encontrado tu carta esta tarde. Me ha parecido algo precioso ☺️ y bueno, quería darte las gracias por hacer estas cosas tan bonitas ❤️" }
];

function parseFecha(f) {
  if (!f) return new Date(0);
  var p = f.split('/');
  return new Date(+p[2], +p[1] - 1, +p[0]);
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function formatFecha(f) {
  if (!f) return '';
  var meses = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  var p = f.split('/');
  return p[0] + ' ' + meses[+p[1]-1] + ' ' + p[2];
}

function renderizar() {
  var sorted = mensajes.slice().sort(function(a, b) {
    return parseFecha(b.fecha) - parseFecha(a.fecha);
  });

  var grid = document.getElementById('testimoniosGrid');
  grid.innerHTML = sorted.map(function(m, i) {
    var color = i % 2 === 0 ? 'verde' : 'naranja';
    var fecha = m.fecha ? formatFecha(m.fecha) : '';
    return '<div class="dest-card" style="transition-delay:' + (i * 45) + 'ms">' +
      '<div class="dest-bubble ' + color + '">' +
        '<p class="dest-quote">' + esc(m.mensaje) + '</p>' +
        '<div class="dest-footer">' +
          '<div class="dest-avatar">' +
            '<img src="assets/monograma-verde.png" alt="" />' +
          '</div>' +
          '<div>' +
            '<span class="dest-nombre">' + esc(m.nombre) + '</span>' +
            (fecha ? '<span class="dest-fecha">' + fecha + '</span>' : '') +
          '</div>' +
        '</div>' +
      '</div>' +
      '<div class="dest-tail ' + color + '"></div>' +
    '</div>';
  }).join('');

  requestAnimationFrame(function() {
    var obs = new IntersectionObserver(function(entries) {
      entries.forEach(function(e) {
        if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); }
      });
    }, { threshold: 0.05 });
    grid.querySelectorAll('.dest-card').forEach(function(c) { obs.observe(c); });
  });
}

document.addEventListener('DOMContentLoaded', renderizar);
</script>

</body>
</html>
